name: OS Smoke

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    name: Smoke (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install smoke dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pillow

      - name: Run cross-platform smoke tests
        shell: bash
        env:
          PYTHONPATH: .
        run: |
          pytest -q --no-cov \
            tests/unit/test_scanner.py \
            tests/unit/test_scanner_edge_cases.py \
            tests/integration/test_pipeline.py::test_pipeline_preview_and_apply_quarantine_with_undo \
            tests/e2e/test_end_to_end.py::test_e2e_edge_case_preview_duplicate_counts
